version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000
      - NEXT_PUBLIC_WS_URL=ws://backend:4000
      - NEXT_PUBLIC_MQTT_URL=mqtt://mqtt:1883
    depends_on:
      - backend
    networks:
      - waste-net

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/waste_intelligence
      - JWT_SECRET=your-super-secret-key-change-in-production
      - MQTT_BROKER=mqtt://mqtt:1883
      - PORT=4000
    depends_on:
      - mongo
      - mqtt
    networks:
      - waste-net

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - waste-net

  mqtt:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - waste-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - waste-net

volumes:
  mongo_data:

networks:
  waste-net:
    driver: bridge
